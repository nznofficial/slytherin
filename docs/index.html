<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #060606;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .wrapper {
            position: relative;
            box-shadow:
                0 0 0 1px rgba(0, 160, 0, 0.28),
                0 0 28px rgba(0, 160, 0, 0.10),
                0 0 70px rgba(0, 160, 0, 0.05);
        }

        canvas {
            display: block;
            image-rendering: pixelated;
        }

        .scanlines {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0) 0px,
                rgba(0,0,0,0) 2px,
                rgba(0,0,0,0.09) 2px,
                rgba(0,0,0,0.09) 4px
            );
            z-index: 1;
        }

        .vignette {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse 85% 85% at 50% 50%, transparent 38%, rgba(0,0,0,0.55) 100%);
            z-index: 1;
        }

        .hint {
            margin-top: 14px;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #1c3a1c;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <canvas id="game" width="600" height="600"></canvas>
        <div class="scanlines"></div>
        <div class="vignette"></div>
    </div>
    <div class="hint">↑ ↓ ← → to move</div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        const W = 600, H = 600, C = 20;

        let snake, dir, food, score, dead, deadTick;

        function init() {
            snake = [{x:300,y:300},{x:280,y:300},{x:260,y:300}];
            dir   = {x:C, y:0};
            food  = newFood();
            score = 0;
            dead  = false;
            deadTick = 0;
        }

        function newFood() {
            let p;
            do {
                p = {
                    x: (Math.random() * W / C | 0) * C,
                    y: (Math.random() * H / C | 0) * C
                };
            } while (snake.some(s => s.x === p.x && s.y === p.y));
            return p;
        }

        function tick() {
            if (dead) {
                if (++deadTick >= 20) init(); // 20 x 100ms = 2s
                return;
            }

            const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score++;
                food = newFood();
            } else {
                snake.pop();
            }

            if (head.x < 0 || head.x >= W || head.y < 0 || head.y >= H) {
                dead = true; deadTick = 0; return;
            }
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) {
                    dead = true; deadTick = 0; return;
                }
            }
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, W, H);

            if (dead) {
                ctx.textAlign = 'center';

                ctx.shadowBlur = 28;
                ctx.shadowColor = '#C80000';
                ctx.fillStyle = '#C80000';
                ctx.font = 'bold 48px "Courier New", monospace';
                ctx.fillText('GAME OVER', W / 2, 240);
                ctx.shadowBlur = 0;

                ctx.fillStyle = '#ffffff';
                ctx.font = '24px "Courier New", monospace';
                ctx.fillText('Final Score: ' + score, W / 2, 318);

                ctx.fillStyle = '#444';
                ctx.font = '18px "Courier New", monospace';
                ctx.fillText('Auto-restarting...', W / 2, 373);

                ctx.textAlign = 'left';
                return;
            }

            // Food with red glow
            ctx.shadowBlur = 14;
            ctx.shadowColor = '#ff1a1a';
            ctx.fillStyle = '#C80000';
            ctx.fillRect(food.x, food.y, C, C);
            ctx.shadowBlur = 0;

            // Snake with phosphor green glow
            ctx.shadowBlur = 7;
            ctx.shadowColor = '#00ff00';
            for (let i = 0; i < snake.length; i++) {
                ctx.fillStyle = i === 0 ? '#22ff44' : '#00C800';
                ctx.fillRect(snake[i].x, snake[i].y, C, C);
            }
            ctx.shadowBlur = 0;

            // Score
            ctx.fillStyle = '#ffffff';
            ctx.font = '24px "Courier New", monospace';
            ctx.fillText('Score: ' + score, 10, 30);
        }

        document.addEventListener('keydown', e => {
            if      (e.key === 'ArrowUp'    && dir.y !==  C) dir = {x:0,  y:-C};
            else if (e.key === 'ArrowDown'  && dir.y !== -C) dir = {x:0,  y: C};
            else if (e.key === 'ArrowLeft'  && dir.x !==  C) dir = {x:-C, y:0};
            else if (e.key === 'ArrowRight' && dir.x !== -C) dir = {x: C, y:0};
            if (e.key.startsWith('Arrow')) e.preventDefault();
        });

        init();
        setInterval(() => { tick(); draw(); }, 100);
    </script>
</body>
</html>
