<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake — Golden Snitch</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #060604;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .wrapper {
            position: relative;
            box-shadow:
                0 0 0 1px rgba(212, 160, 20, 0.32),
                0 0 30px rgba(212, 160, 20, 0.12),
                0 0 80px rgba(212, 160, 20, 0.05);
        }

        canvas {
            display: block;
            image-rendering: pixelated;
        }

        .scanlines {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0) 0px,
                rgba(0,0,0,0) 2px,
                rgba(0,0,0,0.08) 2px,
                rgba(0,0,0,0.08) 4px
            );
            z-index: 1;
        }

        .vignette {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse 85% 85% at 50% 50%, transparent 38%, rgba(0,0,0,0.58) 100%);
            z-index: 1;
        }

        .hint {
            margin-top: 14px;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #3a2c06;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <canvas id="game" width="600" height="600"></canvas>
        <div class="scanlines"></div>
        <div class="vignette"></div>
    </div>
    <div class="hint">↑ ↓ ← → to move</div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        const W = 600, H = 600, C = 20;

        let snake, dir, food, score, dead, deadTick, time = 0;

        function init() {
            snake = [{x:300,y:300},{x:280,y:300},{x:260,y:300}];
            dir   = {x:C, y:0};
            food  = newFood();
            score = 0;
            dead  = false;
            deadTick = 0;
        }

        function newFood() {
            let p;
            do {
                p = {
                    x: (Math.random() * W / C | 0) * C,
                    y: (Math.random() * H / C | 0) * C
                };
            } while (snake.some(s => s.x === p.x && s.y === p.y));
            return p;
        }

        function tick() {
            if (dead) {
                if (++deadTick >= 20) init();
                return;
            }

            const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score++;
                food = newFood();
            } else {
                snake.pop();
            }

            if (head.x < 0 || head.x >= W || head.y < 0 || head.y >= H) {
                dead = true; deadTick = 0; return;
            }
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) {
                    dead = true; deadTick = 0; return;
                }
            }
        }

        // Returns the direction the tail is trailing (away from the body)
        function tailDir() {
            if (snake.length < 2) return {x: 1, y: 0};
            const t = snake[snake.length - 1];
            const p = snake[snake.length - 2];
            return { x: Math.sign(t.x - p.x), y: Math.sign(t.y - p.y) };
        }

        function drawSnitch(x, y, pulse) {
            const cx = x + C / 2, cy = y + C / 2, r = C / 2 - 1;

            // Wings
            ctx.fillStyle = 'rgba(220, 232, 255, 0.90)';
            ctx.shadowBlur = 6 + pulse * 4;
            ctx.shadowColor = 'rgba(210, 225, 255, 0.75)';
            ctx.beginPath();
            ctx.moveTo(cx - r + 1, cy - 2);
            ctx.bezierCurveTo(cx - r - 9, cy - 8, cx - r - 11, cy + 2, cx - r + 1, cy + 3);
            ctx.closePath();
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(cx + r - 1, cy - 2);
            ctx.bezierCurveTo(cx + r + 9, cy - 8, cx + r + 11, cy + 2, cx + r - 1, cy + 3);
            ctx.closePath();
            ctx.fill();
            ctx.shadowBlur = 0;

            // Sphere
            const grad = ctx.createRadialGradient(cx - 3, cy - 3, 1, cx, cy, r);
            grad.addColorStop(0,    '#FFFFF0');
            grad.addColorStop(0.30, '#FFD700');
            grad.addColorStop(0.75, '#C8960C');
            grad.addColorStop(1,    '#7A5700');
            ctx.shadowBlur = 14 + pulse * 8;
            ctx.shadowColor = '#FFD700';
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function drawBroom() {
            const len = snake.length;

            // --- Handle: all segments except the last ---
            ctx.shadowBlur = 4;
            ctx.shadowColor = 'rgba(80, 40, 10, 0.7)';

            for (let i = 0; i < len - 1; i++) {
                const s = snake[i];
                // Head tip is a lighter, brighter wood; body is darker
                ctx.fillStyle = i === 0 ? '#A0652A' : '#7A4520';
                ctx.fillRect(s.x, s.y, C, C);
            }
            ctx.shadowBlur = 0;

            // Wood grain: two thin lighter bands across each segment
            ctx.fillStyle = 'rgba(220, 160, 80, 0.18)';
            for (let i = 0; i < len - 1; i++) {
                const s = snake[i];
                ctx.fillRect(s.x + 1, s.y + 4,  C - 2, 2);
                ctx.fillRect(s.x + 1, s.y + 13, C - 2, 2);
            }

            // --- Bristle block: last segment ---
            const td  = tailDir();
            const tail = snake[len - 1];

            const horiz = td.x !== 0; // tail trailing left or right

            // The bristle block is wider in the axis perpendicular to travel
            const EXTRA = 10; // px to extend each side
            const bx = horiz ? tail.x           : tail.x - EXTRA;
            const by = horiz ? tail.y - EXTRA   : tail.y;
            const bw = horiz ? C                : C + EXTRA * 2;
            const bh = horiz ? C + EXTRA * 2   : C;

            // Straw base
            ctx.fillStyle = '#C8A050';
            ctx.fillRect(bx, by, bw, bh);

            // Dark separator line where handle meets bristles (inner edge)
            ctx.fillStyle = '#5C3010';
            if (horiz) {
                // tail is trailing horizontally → inner edge is left or right face
                const innerX = td.x > 0 ? tail.x : tail.x + C - 2;
                ctx.fillRect(innerX, by, 2, bh);
            } else {
                // tail is trailing vertically → inner edge is top or bottom face
                const innerY = td.y > 0 ? tail.y : tail.y + C - 2;
                ctx.fillRect(bx, innerY, bw, 2);
            }

            // Bristle strand lines (run perpendicular to the block's long axis)
            ctx.fillStyle = 'rgba(80, 50, 10, 0.30)';
            if (horiz) {
                // block is taller; strands run horizontally
                for (let l = 4; l < bh - 2; l += 5) {
                    ctx.fillRect(bx + 1, by + l, bw - 2, 1);
                }
            } else {
                // block is wider; strands run vertically
                for (let l = 4; l < bw - 2; l += 5) {
                    ctx.fillRect(bx + l, by + 1, 1, bh - 2);
                }
            }
        }

        function draw() {
            time += 0.18;
            const pulse = (Math.sin(time) + 1) / 2;

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, W, H);

            if (dead) {
                ctx.textAlign = 'center';
                ctx.shadowBlur = 32;
                ctx.shadowColor = '#FFD700';
                ctx.fillStyle = '#FFD700';
                ctx.font = 'bold 48px "Courier New", monospace';
                ctx.fillText('GAME OVER', W / 2, 240);
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#C8960C';
                ctx.font = '24px "Courier New", monospace';
                ctx.fillText('Final Score: ' + score, W / 2, 318);
                ctx.fillStyle = '#444';
                ctx.font = '18px "Courier New", monospace';
                ctx.fillText('Auto-restarting...', W / 2, 373);
                ctx.textAlign = 'left';
                return;
            }

            drawSnitch(food.x, food.y, pulse);
            drawBroom();

            ctx.fillStyle = '#FFD700';
            ctx.font = '24px "Courier New", monospace';
            ctx.fillText('Score: ' + score, 10, 30);
        }

        document.addEventListener('keydown', e => {
            if      (e.key === 'ArrowUp'    && dir.y !==  C) dir = {x:0,  y:-C};
            else if (e.key === 'ArrowDown'  && dir.y !== -C) dir = {x:0,  y: C};
            else if (e.key === 'ArrowLeft'  && dir.x !==  C) dir = {x:-C, y:0};
            else if (e.key === 'ArrowRight' && dir.x !== -C) dir = {x: C, y:0};
            if (e.key.startsWith('Arrow')) e.preventDefault();
        });

        init();
        setInterval(() => { tick(); draw(); }, 100);
    </script>
</body>
</html>
