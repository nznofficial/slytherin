<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake — Golden Snitch</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #060604;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .wrapper {
            position: relative;
            box-shadow:
                0 0 0 1px rgba(212, 160, 20, 0.32),
                0 0 30px rgba(212, 160, 20, 0.12),
                0 0 80px rgba(212, 160, 20, 0.05);
        }

        canvas {
            display: block;
            image-rendering: pixelated;
        }

        .scanlines {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0) 0px,
                rgba(0,0,0,0) 2px,
                rgba(0,0,0,0.08) 2px,
                rgba(0,0,0,0.08) 4px
            );
            z-index: 1;
        }

        .vignette {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse 85% 85% at 50% 50%, transparent 38%, rgba(0,0,0,0.58) 100%);
            z-index: 1;
        }

        .hint {
            margin-top: 14px;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #3a2c06;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <canvas id="game" width="600" height="600"></canvas>
        <div class="scanlines"></div>
        <div class="vignette"></div>
    </div>
    <div class="hint">↑ ↓ ← → to move</div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        const W = 600, H = 600, C = 20;

        let snake, dir, food, score, dead, deadTick, time = 0;

        function init() {
            snake = [{x:300,y:300},{x:280,y:300},{x:260,y:300}];
            dir   = {x:C, y:0};
            food  = newFood();
            score = 0;
            dead  = false;
            deadTick = 0;
        }

        function newFood() {
            let p;
            do {
                p = {
                    x: (Math.random() * W / C | 0) * C,
                    y: (Math.random() * H / C | 0) * C
                };
            } while (snake.some(s => s.x === p.x && s.y === p.y));
            return p;
        }

        function tick() {
            if (dead) {
                if (++deadTick >= 20) init(); // 20 x 100ms = 2s
                return;
            }

            const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score++;
                food = newFood();
            } else {
                snake.pop();
            }

            if (head.x < 0 || head.x >= W || head.y < 0 || head.y >= H) {
                dead = true; deadTick = 0; return;
            }
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) {
                    dead = true; deadTick = 0; return;
                }
            }
        }

        // Draw the golden snitch: winged golden sphere
        function drawSnitch(x, y, pulse) {
            const cx = x + C / 2;
            const cy = y + C / 2;
            const r  = C / 2 - 1; // 9px

            // Wings — silvery-white, bezier curves
            const wingGlow = 6 + pulse * 4;
            ctx.fillStyle = 'rgba(220, 232, 255, 0.90)';
            ctx.shadowBlur = wingGlow;
            ctx.shadowColor = 'rgba(210, 225, 255, 0.75)';

            // Left wing
            ctx.beginPath();
            ctx.moveTo(cx - r + 1, cy - 2);
            ctx.bezierCurveTo(cx - r - 9, cy - 8, cx - r - 11, cy + 2, cx - r + 1, cy + 3);
            ctx.closePath();
            ctx.fill();

            // Right wing
            ctx.beginPath();
            ctx.moveTo(cx + r - 1, cy - 2);
            ctx.bezierCurveTo(cx + r + 9, cy - 8, cx + r + 11, cy + 2, cx + r - 1, cy + 3);
            ctx.closePath();
            ctx.fill();
            ctx.shadowBlur = 0;

            // Golden sphere with radial gradient (highlight top-left)
            const grad = ctx.createRadialGradient(cx - 3, cy - 3, 1, cx, cy, r);
            grad.addColorStop(0,    '#FFFFF0');
            grad.addColorStop(0.30, '#FFD700');
            grad.addColorStop(0.75, '#C8960C');
            grad.addColorStop(1,    '#7A5700');

            ctx.shadowBlur = 14 + pulse * 8;
            ctx.shadowColor = '#FFD700';
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function draw() {
            time += 0.18; // ~1.8 rad/s → full pulse every ~3.5s
            const pulse = (Math.sin(time) + 1) / 2; // 0..1

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, W, H);

            if (dead) {
                ctx.textAlign = 'center';

                ctx.shadowBlur = 32;
                ctx.shadowColor = '#FFD700';
                ctx.fillStyle = '#FFD700';
                ctx.font = 'bold 48px "Courier New", monospace';
                ctx.fillText('GAME OVER', W / 2, 240);
                ctx.shadowBlur = 0;

                ctx.fillStyle = '#C8960C';
                ctx.font = '24px "Courier New", monospace';
                ctx.fillText('Final Score: ' + score, W / 2, 318);

                ctx.fillStyle = '#444';
                ctx.font = '18px "Courier New", monospace';
                ctx.fillText('Auto-restarting...', W / 2, 373);

                ctx.textAlign = 'left';
                return;
            }

            // Draw golden snitch (food) with breathing pulse
            drawSnitch(food.x, food.y, pulse);

            // Snake body — gold with metallic sheen
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#C8960C';
            for (let i = 0; i < snake.length; i++) {
                ctx.fillStyle = i === 0 ? '#FFE044' : '#CFA020';
                ctx.fillRect(snake[i].x, snake[i].y, C, C);
            }
            ctx.shadowBlur = 0;

            // Metallic highlight strip (top + left edge of each body segment)
            ctx.fillStyle = 'rgba(255, 252, 190, 0.22)';
            for (let i = 0; i < snake.length; i++) {
                ctx.fillRect(snake[i].x,     snake[i].y, C, 2); // top
                ctx.fillRect(snake[i].x,     snake[i].y, 2, C); // left
            }

            // Score in gold
            ctx.fillStyle = '#FFD700';
            ctx.font = '24px "Courier New", monospace';
            ctx.fillText('Score: ' + score, 10, 30);
        }

        document.addEventListener('keydown', e => {
            if      (e.key === 'ArrowUp'    && dir.y !==  C) dir = {x:0,  y:-C};
            else if (e.key === 'ArrowDown'  && dir.y !== -C) dir = {x:0,  y: C};
            else if (e.key === 'ArrowLeft'  && dir.x !==  C) dir = {x:-C, y:0};
            else if (e.key === 'ArrowRight' && dir.x !== -C) dir = {x: C, y:0};
            if (e.key.startsWith('Arrow')) e.preventDefault();
        });

        init();
        setInterval(() => { tick(); draw(); }, 100);
    </script>
</body>
</html>
